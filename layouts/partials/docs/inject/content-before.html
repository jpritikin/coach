<div id="book-banner" style="position:relative;overflow:hidden;border-radius:10px;margin-bottom:1.75rem;box-shadow:0 4px 16px rgba(0,0,0,0.18)">
  <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a3a6b 0%,#2d6a9f 100%)"></div>
  <img src="/book-banner-bg.svg" alt="" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.18;pointer-events:none">
  <div id="book-banner-full" style="position:relative;padding:1.25rem 1.75rem;text-align:center">
    <button id="book-banner-minimize" aria-label="Minimize banner" onclick="bookBannerMinimize()" style="position:absolute;top:0.6rem;right:0.75rem;background:rgba(255,255,255,0.15);border:none;border-radius:6px;cursor:pointer;color:#ffffff;font-size:1.4rem;line-height:1;padding:0.25rem 0.6rem">&#x2212;</button>
    <div style="color:#ffd700;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;font-weight:700;margin-bottom:0.35rem">New Book</div>
    <div style="color:#ffffff;font-size:1.15rem;font-weight:600;margin-bottom:0.2rem"><em>Religion Unburdened by Belief:</em></div>
    <div style="color:#c8dff5;font-size:0.95rem;margin-bottom:0.75rem"><em>The Way of Open Inquiry</em></div>
    <div style="color:#a8c8e8;font-size:0.85rem;margin-bottom:0.85rem">Releasing June 15, 2026</div>
    <a href="https://unburdened.biz" style="display:inline-block;background:#ffd700;color:#1a3a6b;font-weight:700;font-size:0.9rem;padding:0.45rem 1.25rem;border-radius:20px;text-decoration:none;letter-spacing:0.03em">Learn More &#x2192;</a>
  </div>
  <div id="book-banner-mini" style="display:none;position:relative;padding:0.5rem 1.75rem;text-align:center">
    <span style="color:#c8dff5;font-size:0.85rem"><em>Religion Unburdened by Belief</em> &mdash; Releasing June 15, 2026 &nbsp;<a href="https://unburdened.biz" style="color:#ffd700;font-weight:700;text-decoration:none">Learn More &#x2192;</a></span>
    <button aria-label="Expand banner" onclick="bookBannerExpand()" style="background:rgba(255,255,255,0.15);border:none;border-radius:6px;cursor:pointer;color:#ffffff;font-size:1.4rem;line-height:1;padding:0.25rem 0.6rem;margin-left:0.75rem;vertical-align:middle">&#x2b;</button>
  </div>
</div>
<script>
(function() {
  if (sessionStorage.getItem('bookBannerMinimized') === '1') {
    document.getElementById('book-banner-full').style.display = 'none';
    document.getElementById('book-banner-mini').style.display = 'block';
  }
})();
function bookBannerMinimize() {
  sessionStorage.setItem('bookBannerMinimized', '1');
  document.getElementById('book-banner-full').style.display = 'none';
  document.getElementById('book-banner-mini').style.display = 'block';
}
function bookBannerExpand() {
  sessionStorage.removeItem('bookBannerMinimized');
  document.getElementById('book-banner-full').style.display = 'block';
  document.getElementById('book-banner-mini').style.display = 'none';
}
</script>
